<<!DOCTYPE html>
<html lang="zh-Hant">
<head>

    <title>履歷表</title>
    <link rel="stylesheet" href="style.css">
    <style>

        .sidebar { background: #2c3e50; color: white; padding: 20px; width: 30%; text-align: center; }
        .profile { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid white; margin-bottom: 15px; }
        .main { background: white; padding: 20px; width: 70%; }
        .card { margin-bottom: 20px; padding: 15px; border-radius: 10px; background: #f9f9f9; }
        h1 { margin: 10px 0; }
        h2 { color: #333; }
        .contact p { margin: 5px 0; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">

    <!-- 左側 -->

        <img src="profile.jpg" class="profile" alt="個人照片">

        <div class="contact">

            <p>📧 example@email.com</p>
            <p>📍 台灣</p>
        </div>

        <h2>技能</h2>

    <!-- 右側 -->

        <section class="card">

            </p>

            </ul>
        </section>

        <section class="card">
            <h2>經歷</h2>
            <ul>
                <li>網頁設計專題開發</li>
                <li>參加程式競賽</li>
            </ul>
        </section>

        <section class="card">
            <h2>作品集</h2>
            <ul>
                <li>個人網站</li>
                <li>待辦事項 App</li>
            </ul>
        </section>

    </main>
</div>

</body>
</html>
