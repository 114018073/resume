<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>履歷表</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- 左側 -->
    <aside class="sidebar">
        <img src="images/profile.jpg" class="profile" alt="個人照片">

        <h1>你的名字</h1>
        <p class="id">學號：AU114018073</p>

        <div class="contact">
            <p>📞 0912-345-678</p>
            <p>📧 example@email.com</p>
            <p>📍 台灣</p>
        </div>

        <h2>技能</h2>

        <div class="skill">
            <span>HTML</span>
            <div class="bar"><div class="html"></div></div>
        </div>

        <div class="skill">
            <span>CSS</span>
            <div class="bar"><div class="css"></div></div>
        </div>

        <div class="skill">
            <span>JavaScript</span>
            <div class="bar"><div class="js"></div></div>
        </div>

        <button onclick="toggleTheme()">切換主題</button>
    </aside>

    <!-- 右側 -->
    <main class="main">

        <section class="card">
            <h2>自我介紹</h2>
            <p>
                我是一位對網頁開發充滿熱情的學生，
                擅長使用 HTML、CSS 與 JavaScript 製作互動式網站，
                並持續學習新技術提升自己的能力。
            </p>
        </section>

        <section class="card">
            <h2>學歷</h2>
            <ul>
                <li>亞洲大學 聽力暨語言治療學系</li>
            </ul>
        </section>

        <section class="card">
            <h2>經歷</h2>
            <ul>
                <li>網頁設計專題開發</li>
                <li>參加程式競賽</li>
            </ul>
        </section>

        <section class="card">
            <h2>作品集</h2>
            <ul>
                <li>個人網站</li>
                <li>待辦事項 App</li>
            </ul>
        </section>

    </main>
</div>

<script src="script.js"></script>
</body>
</html>
